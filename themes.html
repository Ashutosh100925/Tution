    <script>
        // Store functional logic
        const currentTheme = localStorage.getItem('selected-theme') || 'theme-sage';
        
        // Initial Active State
        const themeCards = document.querySelectorAll('.theme-card');
        themeCards.forEach(card => {
            if (card.dataset.theme === currentTheme) {
                activateThemeUI(card);
            }
            
            card.addEventListener('click', () => {
                const newTheme = card.dataset.theme;
                
                // 1. Update localStorage
                localStorage.setItem('selected-theme', newTheme);
                
                // 2. Apply classes immediately
                document.documentElement.className = newTheme;
                
                // 3. Update UI
                themeCards.forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.theme-active-icon').forEach(icon => icon.remove());
                activateThemeUI(card);
            });
        });

        function activateThemeUI(card) {
            card.classList.add('active');
            const nameSpan = card.querySelector('.theme-name');
            if (nameSpan && !nameSpan.querySelector('.theme-active-icon')) {
                const icon = document.createElement('i');
                icon.className = 'fa-solid fa-check theme-active-icon';
                nameSpan.appendChild(icon);
            }
        }

        // Filter interaction
        const filterBtns = document.querySelectorAll('.filter-btn');
        const themesGrid = document.getElementById('themesGrid');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                
                // Update active state of buttons
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Filter the cards
                themeCards.forEach(card => {
                    const category = card.dataset.category;
                    if (filter === 'all' || filter === category) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });
    </script>
